name = "sverklo-telemetry"
main = "worker.ts"
compatibility_date = "2026-04-08"

# Account ID is read from the CLOUDFLARE_ACCOUNT_ID env var.
# Set it in your shell before running wrangler:
#   export CLOUDFLARE_ACCOUNT_ID="<your-account-id>"
# (Find it in https://dash.cloudflare.com — right sidebar of any page.)

# R2 binding — the bucket the Worker writes raw event JSON files into.
# Bucket must exist before deploy: `wrangler r2 bucket create sverklo-telemetry`
[[r2_buckets]]
binding = "TELEMETRY_BUCKET"
bucket_name = "sverklo-telemetry"

# Custom domain: t.sverklo.com → this Worker. Requires sverklo.com to be a
# Cloudflare-managed zone, which it is (migrated from GoDaddy DNS to
# Cloudflare on 2026-04-08). The zone-status check + activation_check API
# both have to report "active" before deploy succeeds with this block.
[[routes]]
pattern = "t.sverklo.com"
custom_domain = true

# NOTE: Custom [limits] are paid-plan only. Workers Free gives every script
# 10ms CPU per request, which is comfortably more than the ~1-2ms our handler
# needs (one JSON parse + one R2 PUT). If you upgrade to a paid plan later
# you can pin a tighter cpu_ms here.
