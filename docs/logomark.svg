<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="sverklo">
  <title>sverklo</title>
  <!--
    Square mark for avatars, favicons, GitHub social preview thumbnails,
    npm card, and the apple-touch-icon shape Apple insists on. Drops the
    "sverklo" wordmark (which doesn't survive 32px) in favour of the
    caret + lowercase 's' — same brand at thumbnail size.

    No bevel, no gradient, no sparkle. Flat fills, sharp corners on the
    caret, matched stroke weights.
  -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#0E0D0B"/>
  <rect x="148" y="156" width="44" height="200" fill="#E85A2A"/>
  <text x="216" y="356"
        font-family="'JetBrains Mono', 'JetBrainsMono-Bold', ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, Consolas, monospace"
        font-weight="700"
        font-size="280"
        letter-spacing="-12"
        fill="#EDE7D9">s</text>
</svg>
