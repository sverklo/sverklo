<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 96" role="img" aria-label="sverklo">
  <title>sverklo</title>
  <!--
    Primary lockup: ▌sverklo
    The caret block is sverklo's standalone symbol — same glyph that
    prefixes .brand in the dashboard. Wordmark is JetBrains Mono Bold;
    fall back through the system mono stack so the file renders cleanly
    even where the font isn't installed (a designer can convert to paths
    for pixel-fidelity in print/social-card use).
  -->
  <rect x="16" y="22" width="14" height="52" fill="#E85A2A"/>
  <text x="44" y="70"
        font-family="'JetBrains Mono', 'JetBrainsMono-Bold', ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, Consolas, monospace"
        font-weight="700"
        font-size="60"
        letter-spacing="-2"
        fill="#EDE7D9">sverklo</text>
</svg>
