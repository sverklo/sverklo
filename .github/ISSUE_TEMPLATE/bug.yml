name: Bug Report
description: Report a bug in Sverklo
labels: [bug]

body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue.
      placeholder: |
        1. Configure Sverklo with ...
        2. Run `sverklo ...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Sverklo version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.x"

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output or logs.
      render: shell
