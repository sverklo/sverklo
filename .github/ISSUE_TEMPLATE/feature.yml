name: Feature Request
description: Suggest a feature or improvement
labels: [enhancement]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why do you need it?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How you think this could work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other details, screenshots, or references.
