name: Latency regression

# Run the MCP roundtrip latency profiler on every PR and comment the
# numbers back. Catches perf regressions before merge. Inspired by Bun's
# benchmark-in-CI pattern — a silent regression is worse than a loud one.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "bin/**"
      - "scripts/mcp-latency-profile.mjs"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/latency-regression.yml"
  workflow_dispatch:

# Only one run per PR — if a new push arrives, cancel the old one.
concurrency:
  group: latency-${{ github.ref }}
  cancel-in-progress: true

jobs:
  latency:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Index sverklo's own repo first so the bench has something to
      # query. Then run the profiler. We keep runs small (10) so CI
      # stays fast; p95 is noisy at n=10 but the trend is enough to
      # flag a 2× regression, which is what we care about catching.
      - name: Profile MCP roundtrip latency
        id: profile
        run: |
          node scripts/mcp-latency-profile.mjs --runs=10 --json > latency-pr.json
          cat latency-pr.json

      # Also run against the base branch for comparison. We check out
      # the base ref in a sibling directory so the PR tree stays intact.
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base-checkout

      - name: Build base
        working-directory: base-checkout
        run: |
          npm ci
          npm run build || true

      - name: Profile base
        working-directory: base-checkout
        run: |
          # If the profiler doesn't exist on base (older PR), emit an
          # empty object so the compare step doesn't crash.
          if [ -f scripts/mcp-latency-profile.mjs ]; then
            node scripts/mcp-latency-profile.mjs --runs=10 --json > ../latency-base.json || echo '{}' > ../latency-base.json
          else
            echo '{}' > ../latency-base.json
          fi

      - name: Compare and comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = JSON.parse(fs.readFileSync('latency-pr.json', 'utf8'));
            const base = JSON.parse(fs.readFileSync('latency-base.json', 'utf8'));

            const prTools = pr.tools || {};
            const baseTools = base.tools || {};

            const rows = [];
            const headerKeys = Object.keys(prTools);
            for (const key of headerKeys) {
              const p = prTools[key] || {};
              const b = baseTools[key] || {};
              const bp50 = b.p50_ms ?? null;
              const pp50 = p.p50_ms ?? null;
              let delta = '—';
              let flag = '';
              if (bp50 != null && pp50 != null && bp50 > 0) {
                const pct = ((pp50 - bp50) / bp50) * 100;
                const sign = pct >= 0 ? '+' : '';
                delta = `${sign}${pct.toFixed(1)}%`;
                if (pct > 50) flag = ' 🔴';
                else if (pct > 20) flag = ' 🟡';
                else if (pct < -20) flag = ' 🟢';
              }
              rows.push(`| \`${key}\` | ${bp50 ?? '—'} | ${pp50 ?? '—'} | ${delta}${flag} | ${p.p95_ms ?? '—'} |`);
            }

            const body = [
              '## MCP roundtrip latency',
              '',
              'End-to-end stdio JSON-RPC roundtrip per tool call (milliseconds). Base = target branch, PR = this branch. 10 runs per tool, first dropped as warm-up.',
              '',
              '| tool | base p50 | PR p50 | Δ | PR p95 |',
              '|------|---------:|-------:|--:|-------:|',
              ...rows,
              '',
              `Init handshake: base ${base.initialize_ms ?? '—'} ms → PR ${pr.initialize_ms ?? '—'} ms`,
              '',
              '🔴 = regression > 50 %, 🟡 = regression > 20 %, 🟢 = improvement > 20 %.',
              '',
              '_Generated by `.github/workflows/latency-regression.yml`._',
            ].join('\n');

            // Find an existing latency comment to update so we don't
            // spam the PR with a new comment on every push.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## MCP roundtrip latency';
            const existing = comments.find(c => c.user.type === 'Bot' && c.body && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload profile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latency-profiles
          path: |
            latency-pr.json
            latency-base.json
          retention-days: 14
